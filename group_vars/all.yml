---
# Valores EJEMPLO para laboratorio reproducible con Vagrant.

dns_zone_name: "lab.example.internal"
dns_reverse_zone_name: "50.168.192.in-addr.arpa"
dns_zone_serial: "2026030501"

dns_ns_fqdn: "ns1.lab.example.internal"
dns_admin_rname: "admin.lab.example.internal"

dns_listen_on_ipv4:
  - "127.0.0.1"
  - "192.168.56.20"
  - "192.168.50.10"

dns_allow_query:
  - "127.0.0.1"
  - "192.168.56.0/24"
  - "192.168.50.0/24"

dns_recursion: true

dns_forwarders:
  - "1.1.1.1"
  - "8.8.8.8"

dns_ttl: 3600
dns_refresh: 3600
dns_retry: 900
dns_expire: 1209600
dns_minimum_ttl: 3600

dns_a_records:
  - name: "ns1"
    ip: "192.168.50.10"
  - name: "server"
    ip: "192.168.50.10"
  - name: "app1"
    ip: "192.168.50.20"
  - name: "client1"
    ip: "192.168.50.100"

dhcp_listen_interface: "enp0s9"
dhcp_authoritative: true
dhcp_domain_name: "{{ dns_zone_name }}"
dhcp_domain_name_servers:
  - "192.168.50.10"
dhcp_default_lease_time: 3600
dhcp_max_lease_time: 7200

dhcp_subnets:
  - network: "192.168.50.0"
    netmask: "255.255.255.0"
    range_start: "192.168.50.100"
    range_end: "192.168.50.150"
    routers: "192.168.50.1"
    broadcast_address: "192.168.50.255"
    domain_name: "{{ dns_zone_name }}"
    domain_name_servers:
      - "192.168.50.10"

dhcp_reservations: []
